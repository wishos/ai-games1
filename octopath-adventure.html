<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>八方旅人风格 - HD-2D 冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080c;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:serif;color:#e8e4d9;overflow:hidden;}
#wrap{position:relative;width:800px;height:560px;border:2px solid #c9a227;box-shadow:0 0 40px rgba(201,162,39,0.15);}
#bgC,#gC,#pC{position:absolute;top:0;left:0;width:100%;height:100%;}
#gC{image-rendering:pixelated;}
#pC{pointer-events:none;}
#ui{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;}
.panel{background:rgba(8,8,14,0.88);border:1px solid #c9a227;padding:8px 14px;font-size:12px;}
.ptitle{color:#c9a227;font-size:10px;letter-spacing:2px;margin-bottom:4px;}
.s{color:#8a8078;}.s span{color:#e8e4d9;}
.hp-bar{width:90px;height:5px;background:#2a1515;margin-top:2px;}
.hp-f{height:100%;background:linear-gradient(90deg,#c94444,#ff6644);}
.mp-bar{width:70px;height:4px;background:#15202a;margin-top:2px;}
.mp-f{height:100%;background:linear-gradient(90deg,#4466cc,#66aaff);}
.xp-bar{width:100px;height:3px;background:#2a2510;margin-top:3px;}
.xp-f{height:100%;background:linear-gradient(90deg,#c9a227,#ffdd66);}
#info{position:absolute;bottom:8px;left:8px;background:rgba(8,8,14,0.88);border:1px solid #c9a227;padding:8px 12px;font-size:11px;color:#8a8078;line-height:1.8;}
#mm{position:absolute;bottom:8px;right:8px;width:100px;height:100px;background:rgba(8,8,14,0.88);border:1px solid #c9a227;}
#bo{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(4,4,10,0.94);}
#bo.on{display:block;}
#bc{width:100%;height:100%;}
#bui{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(8,8,14,0.97),transparent);padding:16px 30px 24px;}
#bt{text-align:center;color:#c9a227;font-size:13px;letter-spacing:4px;margin-bottom:8px;}
#blg{background:rgba(0,0,0,0.5);border:1px solid #3a3a4a;padding:6px 10px;height:50px;overflow-y:auto;font-size:11px;line-height:1.9;margin-bottom:10px;}
.bd{color:#ff5566;}.bh{color:#55ff88;}.bv{color:#ffd700;}
#ba{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.bbtn{font-family:serif;font-size:12px;padding:8px 16px;background:linear-gradient(180deg,#2a2a3a,#18182a);color:#c9a227;border:1px solid #c9a227;cursor:pointer;min-width:80px;}
.bbtn:hover:not(:disabled){background:#c9a227;color:#18182a;}
.bbtn:disabled{opacity:0.3;cursor:not-allowed;}
#so{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(8,8,14,0.97),rgba(18,12,28,0.97));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;}
#so h1{font-size:32px;color:#c9a227;letter-spacing:8px;text-shadow:0 0 20px rgba(201,162,39,0.4);margin-bottom:8px;}
#so h2{font-size:12px;color:#6a6a7a;letter-spacing:4px;margin-bottom:30px;}
#so p{font-size:12px;color:#5a5a6a;line-height:2.2;text-align:center;margin-bottom:28px;}
.sbtn{font-family:serif;font-size:14px;padding:12px 36px;background:transparent;color:#c9a227;border:1px solid #c9a227;cursor:pointer;letter-spacing:4px;}
.sbtn:hover{background:#c9a227;color:#18182a;}
</style>
</head>
<body>
<div id="wrap">
<canvas id="bgC" width="800" height="560"></canvas>
<canvas id="gC" width="800" height="560"></canvas>
<canvas id="pC" width="800" height="560"></canvas>

<div id="ui">
<div class="panel">
<div class="ptitle">冒险者</div>
<div class="s">等级 <span id="lv">1</span>　金币 <span id="gd">0</span></div>
<div class="s" style="margin-top:4px;">HP</div>
<div class="hp-bar"><div class="hp-f" id="hf" style="width:100%"></div></div>
<div class="s" style="margin-top:3px;">MP</div>
<div class="mp-bar"><div class="mp-f" id="mf" style="width:100%"></div></div>
<div class="s" style="margin-top:3px;">EXP</div>
<div class="xp-bar"><div class="xp-f" id="xf" style="width:0%"></div></div>
</div>
<div class="panel" style="text-align:right;">
<div class="ptitle">探索</div>
<div class="s">第 <span id="fl">1</span> 层</div>
<div class="s">步数 <span id="st">0</span></div>
</div>
</div>

<div id="info">WASD移动 · 撞墙遇敌 · 寻找楼梯通往下一层</div>
<canvas id="mm" width="100" height="100"></canvas>

<div id="bo"><canvas id="bc" width="800" height="560"></canvas>
<div id="bui">
<div id="bt">— 战 斗 —</div>
<div id="blg"></div>
<div id="ba">
<button class="bbtn" id="b-atk">⚔ 攻击</button>
<button class="bbtn" id="b-def">🛡 防御</button>
<button class="bbtn" id="b-skl">✨ 技能</button>
<button class="bbtn" id="b-itm">💊 道具</button>
<button class="bbtn" id="b-fle">🏃 逃跑</button>
</div>
</div>
</div>

<div id="so">
<h1>八 方 旅 人</h1>
<h2>HD-2D 像素冒险</h2>
<p>WASD 移动角色<br>探索广袤的幻想世界<br>击败强敌，寻找命运的真谛</p>
<button class="sbtn" id="btn-go">开 始 旅 程</button>
</div>
</div>

<script>
const bgC=document.getElementById('bgC'),bgX=bgC.getContext('2d');
const gC=document.getElementById('gC'),gX=gC.getContext('2d');
const pC=document.getElementById('pC'),pX=pC.getContext('2d');
const mmC=document.getElementById('mm'),mX=mmC.getContext('2d');
const bC=document.getElementById('bc'),bX=bC.getContext('2d');

const W=800,H=560,T=40,COLS=W/T,ROWS=H/T;

const P2={sky1:'#1a1528',sky2:'#3d2a4a',grass1:'#3a5a2a',grass2:'#4a6a35',grass3:'#2a4a1a',path:'#8a7a5a',wall:'#4a4a5a',wallT:'#6a6a7a',cape:'#8b2942',armor:'#4a6a8a',skin:'#e8c8a0',hair:'#3a2a1a',slime:'#5aaa5a',skel:'#d8d8c0',demon:'#aa2244',dragon:'#661133',gold:'#c9a227'};

let P={hp:120,maxHp:120,mp:30,maxMp:30,exp:0,level:1,atk:14,def:6,spd:5,luk:3,gold:0,inv:[{t:'potion',n:2}]};
let map=[],fog=[],pl={x:5,y:5},fl=1,steps=0,enemies=[],chests=[],stX=0,stY=0;
let inB=false,ce=null,bTurn='player',defending=false;
let parts=[];

const ET={slime:{n:'史莱姆',h:25,a:6,d:2,s:3,e:12,g:8,c:'#5aaa5a'},skeleton:{n:'骷髅战士',h:40,a:12,d:5,s:4,e:25,g:15,c:'#d8d8c0'},demon:{n:'深渊恶魔',h:80,a:22,d:8,s:5,e:60,g:45,c:'#aa2244'},dragon:{n:'远古巨龙',h:300,a:40,d:20,s:6,e:300,g:500,c:'#661133'}};

function xpN(lv){return Math.floor(Math.pow(lv,1.5)*60);}
function gHP(){return P.maxHp;}function gMP(){return P.maxMp;}
function gATK(){return P.atk;}function gDEF(){return P.def;}function gSPD(){return P.spd;}function gLUK(){return P.luk;}

function lvlUp(){while(P.exp>=xpN(P.level)){P.exp-=xpN(P.level);P.level++;P.maxHp+=12;P.maxMp+=4;P.hp=gHP();P.mp=gMP();P.atk+=2;P.def+=1;P.spd+=1;P.luk+=1;bl(`<span class="bv">🎉 Lv.${P.level}！能力提升！</span>`);}}

function updUI(){
  document.getElementById('lv').textContent=P.level;
  document.getElementById('gd').textContent=P.gold;
  document.getElementById('fl').textContent=fl;
  document.getElementById('st').textContent=steps;
  document.getElementById('hf').style.width=(P.hp/gHP()*100)+'%';
  document.getElementById('mf').style.width=(P.mp/gMP()*100)+'%';
  document.getElementById('xf').style.width=(P.exp/xpN(P.level)*100)+'%';
}

function initParts(){parts=[];for(let i=0;i<35;i++)parts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.4,vy:-0.3-Math.random()*0.4,sz:1+Math.random()*2,al:0.3+Math.random()*0.5,co:Math.random()>0.5?'#ffeeaa':'#aaffaa'});}
function updParts(){pX.clearRect(0,0,W,H);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.y<0){p.y=H;p.x=Math.random()*W;}pX.fillStyle=p.co;pX.globalAlpha=p.al;pX.fillRect(p.x,p.y,p.sz,p.sz);});pX.globalAlpha=1;}

function drawBG(){
  const ctx=bgX,w=W,h=H;
  const sky=ctx.createLinearGradient(0,0,0,h*0.6);
  sky.addColorStop(0,P2.sky1);sky.addColorStop(1,P2.sky2);
  ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);
  
  // Sun
  const sx=w*0.75,sy=h*0.18;
  const gl=ctx.createRadialGradient(sx,sy,0,sx,sy,100);gl.addColorStop(0,'rgba(255,200,100,0.35)');gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.fillRect(sx-120,sy-120,240,240);
  ctx.fillStyle='#ffaa44';ctx.beginPath();ctx.arc(sx,sy,24,0,Math.PI*2);ctx.fill();
  
  // Clouds
  function cloud(cx,cy,s){ctx.fillStyle='rgba(200,180,220,0.5)';ctx.beginPath();ctx.arc(cx,cy,16*s,0,Math.PI*2);ctx.arc(cx+20*s,cy-4*s,20*s,0,Math.PI*2);ctx.arc(cx+44*s,cy,18*s,0,Math.PI*2);ctx.fill();}
  cloud(w*0.2,h*0.14,1.1);cloud(w*0.55,h*0.1,0.8);
  
  // Hills
  ctx.fillStyle='#2a3a2a';
  ctx.beginPath();ctx.moveTo(0,h*0.5);
  for(let x=0;x<=w;x+=30)ctx.lineTo(x,h*0.46+Math.sin(x*0.012)*18+Math.sin(x*0.025)*12);
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  
  ctx.fillStyle='#3a4a35';
  ctx.beginPath();ctx.moveTo(0,h*0.55);
  for(let x=0;x<=w;x+=25)ctx.lineTo(x,h*0.52+Math.sin(x*0.016+1)*15+Math.sin(x*0.03)*10);
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  
  // Ground
  const gr=ctx.createLinearGradient(0,h*0.6,0,h);gr.addColorStop(0,P2.grass2);gr.addColorStop(1,P2.grass1);
  ctx.fillStyle=gr;ctx.fillRect(0,h*0.6,w,h*0.4);
  
  // Path
  ctx.fillStyle=P2.path;
  ctx.beginPath();
  ctx.moveTo(w*0.35,h*0.6);
  ctx.quadraticCurveTo(w*0.5,h*0.68,w*0.65,h*0.82);
  ctx.quadraticCurveTo(w*0.5,h*0.88,w*0.35,h*0.92);
  ctx.quadraticCurveTo(w*0.4,h*0.76,w*0.35,h*0.6);
  ctx.fill();
}

function genMap(f){
  map=[];fog=[];enemies=[];chests=[];
  for(let y=0;y<ROWS;y++){map[y]=[];fog[y]=[];for(let x=0;x<COLS;x++){map[y][x]=(x===0||y===0||x===COLS-1||y===ROWS-1)?1:0;fog[y][x]=1;}}
  for(let i=0;i<8+f*3;i++){const wx=2+Math.floor(Math.random()*(COLS-4)),wy=2+Math.floor(Math.random()*(ROWS-4));if(wx!==pl.x||wy!==pl.y)map[wy][wx]=1;}
  pl.x=1+Math.floor(Math.random()*3);pl.y=1+Math.floor(Math.random()*3);
  stX=COLS-2-Math.floor(Math.random()*3);stY=ROWS-2-Math.floor(Math.random()*3);map[stY][stX]=2;
  for(let i=0;i<2+f;i++){let cx,cy,t=0;do{cx=2+Math.floor(Math.random()*(COLS-4));cy=2+Math.floor(Math.random()*(ROWS-4));t++;}while(map[cy][cx]!==0&&t<30);if(t<30)chests.push({x:cx,y:cy,op:false});}
  const types=f<3?['slime']:f<5?['slime','skeleton']:f<8?['skeleton','demon']:['skeleton','demon','dragon'];
  for(let i=0;i<4+f*2;i++){let ex,ey,t=0;do{ex=2+Math.floor(Math.random()*(COLS-4));ey=2+Math.floor(Math.random()*(ROWS-4));t++;}while((map[ey][ex]!==0||(ex===pl.x&&ey===pl.y))&&t<50);if(t<50)enemies.push({x:ex,y:ey,t:types[Math.floor(Math.random()*types.length)],al:true});}
  rev(pl.x,pl.y);
}
function rev(px,py){for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){const nx=px+dx,ny=py+dy;if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&Math.abs(dx)+Math.abs(dy)<=4)fog[ny][nx]=0;}}

function render(){
  gX.clearRect(0,0,W,H);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(fog[y][x]===1){gX.fillStyle='#050508';gX.fillRect(x*T,y*T,T,T);continue;}
    const t=map[y][x];
    if(t===1){gX.fillStyle=P2.wall;gX.fillRect(x*T,y*T,T,T);gX.fillStyle=P2.wallT;gX.fillRect(x*T+2,y*T+2,T-4,6);}
    else if(t===2){gX.fillStyle=P2.grass2;gX.fillRect(x*T,y*T,T,T);gX.fillStyle=P2.gold;gX.fillRect(x*T+10,y*T+6,20,28);gX.fillStyle='#aa8800';for(let i=0;i<3;i++)gX.fillRect(x*T+12,y*T+10+i*9,16,4);}
    else{gX.fillStyle=P2.grass1;gX.fillRect(x*T,y*T,T,T);if((x+y)%4===0){gX.fillStyle=P2.grass3;gX.fillRect(x*T+16,y*T+22,2,5);}}
  }
  chests.forEach(c=>{if(c.op||fog[c.y][c.x]===1)return;gX.fillStyle='#6a5a3a';gX.fillRect(c.x*T+10,c.y*T+18,20,12);gX.fillStyle='#cc9933';gX.fillRect(c.x*T+10,c.y*T+14,20,12);gX.fillStyle='#ffcc66';gX.fillRect(c.x*T+17,c.y*T+17,5,5);});
  enemies.forEach(e=>{if(!e.al||fog[e.y][e.x]===1)return;const b=ET[e.t];const ex=e.x*T+(T-32)/2,ey=e.y*T+(T-28)/2;gX.fillStyle=b.c;
    if(e.t==='slime'){gX.fillRect(ex+4,ey+14,24,14);gX.fillRect(ex+6,ey+8,20,8);}
    else if(e.t==='skeleton'){gX.fillRect(ex+10,ey,12,12);gX.fillRect(ex+8,ey+12,16,16);}
    else if(e.t==='demon'){gX.fillRect(ex+4,ey+6,24,22);gX.fillRect(ex-2,ey+2,10,12);gX.fillRect(ex+24,ey+2,10,12);}
    else if(e.t==='dragon'){gX.fillRect(ex,ey+8,40,28);gX.fillRect(ex-6,ey,14,14);gX.fillRect(ex+32,ey,14,14);gX.fillStyle='#ff4444';gX.fillRect(ex+8,ey+16,8,8);gX.fillRect(ex+24,ey+16,8,8);}
  });
  const px=pl.x*T,py=pl.y*T;
  gX.fillStyle=P2.cape;gX.fillRect(px+12,py+22,10,16);gX.fillRect(px+8,py+28,6,10);
  gX.fillStyle=P2.armor;gX.fillRect(px+14,py+18,12,14);
  gX.fillStyle=P2.skin;gX.fillRect(px+16,py+4,8,14);
  gX.fillStyle=P2.hair;gX.fillRect(px+16,py+2,8,7);
  gX.fillStyle='#222';gX.fillRect(px+18,py+10,2,2);gX.fillRect(px+22,py+10,2,2);
  gX.fillStyle='#c0c0c0';gX.fillRect(px+28,py+8,3,20);
  gX.fillStyle=P2.gold;gX.fillRect(px+26,py+10,7,3);
  gX.fillStyle='rgba(255,255,255,0.12)';gX.beginPath();gX.moveTo(px+T/2,py);gX.lineTo(px+T/2-5,py+7);gX.lineTo(px+T/2+5,py+7);gX.fill();
  drawMM();updUI();
}

function drawMM(){
  mX.fillStyle='#08080c';mX.fillRect(0,0,100,100);
  const ts=100/COLS;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(fog[y][x]===1)continue;
    if(map[y][x]===1)mX.fillStyle='#4a4a5a';
    else if(map[y][x]===2)mX.fillStyle=P2.gold;
    else mX.fillStyle='#3a5a3a';
    mX.fillRect(x*ts,y*ts,ts,ts);
  }
  enemies.forEach(e=>{if(e.al&&fog[e.y][e.x]===0){mX.fillStyle='#ff4444';mX.fillRect(e.x*ts,e.y*ts,ts,ts);}});
  mX.fillStyle='#00aaff';mX.fillRect(pl.x*ts,pl.y*ts,ts,ts);
}

function move(dx,dy){
  if(inB)return;
  const nx=pl.x+dx,ny=pl.y+dy;
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS)return;
  if(map[ny][nx]===1){
    const e=enemies.find(e=>e.x===nx&&e.y===ny&&e.al);
    if(e){e.al=false;startBattle(e.t);return;}
    return;
  }
  pl.x=nx;pl.y=ny;steps++;rev(nx,ny);
  if(map[ny][nx]===2){fl++;genMap(fl);bl(`🗼 进入第${fl}层！`);saveD();}
  const ci=chests.findIndex(c=>c.x===nx&&c.y===ny&&!c.op);
  if(ci!==-1){chests[ci].op=true;const gb=10+fl*8+Math.floor(Math.random()*25);P.gold+=gb;bl(`💰 宝箱！+${gb}金币`);saveD();}
  render();
}

function bl(msg){const l=document.getElementById('blg');const p=document.createElement('p');p.innerHTML=msg;l.appendChild(p);l.scrollTop=l.scrollHeight;}
function clearL(){document.getElementById('blg').innerHTML='';}
function sBtns(en){['atk','def','skl','itm','fle'].forEach(id=>document.getElementById('b-'+id).disabled=!en);}

function startBattle(t){
  inB=true;const b=ET[t],fb=1+fl*0.12;
  ce={t,h:Math.floor(b.h*fb),mH:Math.floor(b.h*fb),a:Math.floor(b.a*fb),d:Math.floor(b.d*fb),s:b.s,e:Math.floor(b.e*fb),g:Math.floor(b.g*fb)};
  bTurn=gSPD()>=ce.s?'player':'enemy';defending=false;
  clearL();bl(`⚔️ 遭遇 ${b.n}！`);
  document.getElementById('bo').classList.add('on');sBtns(true);renderB();
}

function patt(){
  if(!inB||bTurn!=='player')return;
  let dmg=gATK()-ce.d+Math.floor(Math.random()*7)-3;
  const crit=Math.random()*100<gLUK()*2;
  if(crit)dmg*=2;
  dmg=Math.max(1,dmg);ce.h=Math.max(0,ce.h-dmg);
  bl(`⚔️ 攻击！<span class="bd">${dmg}</span>伤害${crit?'(暴击!)':''}`);
  ce.h<=0?victory():eTurn();
}
function def(){
  if(!inB||bTurn!=='player')return;
  defending=true;P.mp=Math.min(gMP(),P.mp+5);
  bl('🛡️ 防御！MP+5');eTurn();
}
function skl(){
  if(!inB||bTurn!=='player')return;
  if(P.mp<10){bl('❌ MP不足！');return;}
  P.mp-=10;let dmg=Math.floor(gATK()*1.8)-ce.d+Math.floor(Math.random()*10);dmg=Math.max(1,dmg);ce.h=Math.max(0,ce.h-dmg);
  bl(`✨ 强力一击！<span class="bd">${dmg}</span>伤害！`);ce.h<=0?victory():eTurn();
}
function itm(){
  if(!inB||bTurn!=='player')return;
  const idx=P.inv.findIndex(i=>i.t==='potion'&&i.n>0);
  if(idx===-1){bl('❌ 没有药水！');return;}
  P.inv[idx].n--;if(P.inv[idx].n<=0)P.inv.splice(idx,1);
  const hl=Math.floor(gHP()*0.35);P.hp=Math.min(gHP(),P.hp+hl);
  bl(`💊 药水！HP<span class="bh">+${hl}</span>`);eTurn();
}
function fle(){
  if(!inB||bTurn!=='player')return;
  if(Math.random()<0.6){inB=false;document.getElementById('bo').classList.remove('on');bl('🏃 逃跑成功！');setTimeout(()=>clearL(),800);}
  else{bl('❌ 逃跑失败！');eTurn();}
}
function eTurn(){
  bTurn='enemy';sBtns(false);
  setTimeout(()=>{
    let dmg=ce.a-gDEF()+Math.floor(Math.random()*5)-2;
    if(defending)dmg=Math.floor(dmg*0.5);
    dmg=Math.max(1,dmg);P.hp=Math.max(0,P.hp-dmg);defending=false;
    bl(`敌人攻击！<span class="bd">${dmg}</span>伤害！`);
    if(P.hp<=0){P.hp=Math.floor(gHP()*0.5);P.gold=Math.max(0,P.gold-Math.floor(P.gold*0.1));inB=false;document.getElementById('bo').classList.remove('on');bl('<span class="bd">💀 你倒下了...</span>恢复中...');}
    else{bTurn='player';sBtns(true);}
    render();
  },700);
}
function victory(){
  inB=false;P.exp+=ce.e;P.gold+=ce.g;
  document.getElementById('bo').classList.remove('on');
  bl(`<span class="bv">🎉 胜利！</span>获得${ce.e}EXP，${ce.g}金币`);
  lvlUp();saveD();render();
}

function renderB(){
  bX.clearRect(0,0,W,H);
  if(!ce)return;
  const b=ET[ce.t],cx=W*0.62,cy=H*0.35;
  const bg=bX.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.6);
  bg.addColorStop(0,'#1a0a20');bg.addColorStop(1,'#04040a');
  bX.fillStyle=bg;bX.fillRect(0,0,W,H);
  bX.fillStyle='#12121a';bX.fillRect(0,H*0.55,W,H*0.45);
  bX.fillStyle=b.c;
  if(ce.t==='dragon'){bX.fillRect(cx-50,cy-25,100,65);bX.fillRect(cx-70,cy-45,35,35);bX.fillRect(cx+35,cy-45,35,35);bX.fillStyle='#ff4444';bX.fillRect(cx-35,cy-5,18,18);bX.fillRect(cx+17,cy-5,18,18);}
  else if(ce.t==='demon'){bX.fillRect(cx-30,cy-15,60,50);bX.fillRect(cx-45,cy-35,20,25);bX.fillRect(cx+25,cy-35,20,25);bX.fillStyle='#ff6666';bX.fillRect(cx-20,cy,14,14);bX.fillRect(cx+6,cy,14,14);}
  else if(ce.t==='skeleton'){bX.fillRect(cx-15,cy-25,30,30);bX.fillRect(cx-20,cy+5,40,40);bX.fillRect(cx-30,cy+5,14,8);bX.fillRect(cx+16,cy+5,14,8);}
  else{bX.fillRect(cx-20,cy,40,30);bX.fillRect(cx-16,cy-12,32,16);}
  bX.fillStyle='#c9a227';bX.font='14px serif';bX.fillText(b.n,cx-20,cy-35);
  bX.fillStyle='#2a1515';bX.fillRect(cx-50,cy+45,100,12);
  bX.fillStyle='#c94444';bX.fillRect(cx-50,cy+45,100*(ce.h/ce.mH),12);
  bX.fillStyle='#fff';bX.font='9px serif';bX.fillText(`${ce.h}/${ce.mH}`,cx-20,cy+54);
}

function saveD(){localStorage.setItem('octopath',JSON.stringify({P,fl,steps}));}
function loadD(){const d=localStorage.getItem('octopath');if(d){const da=JSON.parse(d);P={...P,...da.P};fl=da.fl;steps=da.steps||0;}}

function startG(){
  document.getElementById('so').style.display='none';
  genMap(fl);initParts();drawBG();render();
}

document.getElementById('btn-go').onclick=startG;
document.getElementById('b-atk').onclick=patt;
document.getElementById('b-def').onclick=def;
document.getElementById('b-skl').onclick=skl;
document.getElementById('b-itm').onclick=itm;
document.getElementById('b-fle').onclick=fle;

document.addEventListener('keydown',e=>{
  if(e.key==='w'||e.key==='W'||e.key==='ArrowUp')move(0,-1);
  if(e.key==='s'||e.key==='S'||e.key==='ArrowDown')move(0,1);
  if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft')move(-1,0);
  if(e.key==='d'||e.key==='D'||e.key==='ArrowRight')move(1,0);
});

function loop(){updParts();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
