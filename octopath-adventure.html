<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>八方旅人风格 - HD-2D 冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080c;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:serif;color:#e8e4d9;overflow:hidden;}
#wrap{position:relative;width:800px;height:560px;border:2px solid #c9a227;box-shadow:0 0 40px rgba(201,162,39,0.15);}
#bgC,#gC,#pC{position:absolute;top:0;left:0;width:100%;height:100%;}
#gC{image-rendering:pixelated;}
#pC{pointer-events:none;}
#ui{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;}
.panel{background:rgba(8,8,14,0.88);border:1px solid #c9a227;padding:8px 14px;font-size:12px;}
.ptitle{color:#c9a227;font-size:10px;letter-spacing:2px;margin-bottom:4px;}
.s{color:#8a8078;}.s span{color:#e8e4d9;}
.hp-bar{width:90px;height:5px;background:#2a1515;margin-top:2px;}
.hp-f{height:100%;background:linear-gradient(90deg,#c94444,#ff6644);}
.mp-bar{width:70px;height:4px;background:#15202a;margin-top:2px;}
.mp-f{height:100%;background:linear-gradient(90deg,#4466cc,#66aaff);}
.xp-bar{width:100px;height:3px;background:#2a2510;margin-top:3px;}
.xp-f{height:100%;background:linear-gradient(90deg,#c9a227,#ffdd66);}
#info{position:absolute;bottom:8px;left:8px;background:rgba(8,8,14,0.88);border:1px solid #c9a227;padding:8px 12px;font-size:11px;color:#8a8078;line-height:1.8;}
#mm{position:absolute;bottom:8px;right:8px;width:100px;height:100px;background:rgba(8,8,14,0.88);border:1px solid #c9a227;}
#bo{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(4,4,10,0.94);}
#bo.on{display:block;}
#bc{width:100%;height:100%;}
#bui{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(8,8,14,0.97),transparent);padding:16px 30px 24px;}
#bt{text-align:center;color:#c9a227;font-size:13px;letter-spacing:4px;margin-bottom:8px;}
#blg{background:rgba(0,0,0,0.5);border:1px solid #3a3a4a;padding:6px 10px;height:50px;overflow-y:auto;font-size:11px;line-height:1.9;margin-bottom:10px;}
.bd{color:#ff5566;}.bh{color:#55ff88;}.bv{color:#ffd700;}
#ba{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.bbtn{font-family:serif;font-size:12px;padding:8px 16px;background:linear-gradient(180deg,#2a2a3a,#18182a);color:#c9a227;border:1px solid #c9a227;cursor:pointer;min-width:80px;}
.bbtn:hover:not(:disabled){background:#c9a227;color:#18182a;}
.bbtn:disabled{opacity:0.3;cursor:not-allowed;}
#so{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(8,8,14,0.97),rgba(18,12,28,0.97));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;}
#so h1{font-size:32px;color:#c9a227;letter-spacing:8px;text-shadow:0 0 20px rgba(201,162,39,0.4);margin-bottom:8px;}
#so h2{font-size:12px;color:#6a6a7a;letter-spacing:4px;margin-bottom:30px;}
#so p{font-size:12px;color:#5a5a6a;line-height:2.2;text-align:center;margin-bottom:28px;}
.sbtn{font-family:serif;font-size:14px;padding:12px 36px;background:transparent;color:#c9a227;border:1px solid #c9a227;cursor:pointer;letter-spacing:4px;}
.sbtn:hover{background:#c9a227;color:#18182a;}

/* Shop UI */
#shp{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(4,4,10,0.95);z-index:60;}
#shp.on{display:flex;flex-direction:column;align-items:center;padding:20px;}
#shp h2{color:#c9a227;font-size:18px;letter-spacing:6px;margin-bottom:4px;}
#shp .sub{color:#6a6a7a;font-size:11px;margin-bottom:16px;}
#shp-inner{display:flex;gap:20px;width:100%;max-width:700px;}
.shp-col{flex:1;background:rgba(20,18,30,0.9);border:1px solid #3a3a5a;padding:12px;max-height:380px;overflow-y:auto;}
.shp-col h3{color:#c9a227;font-size:12px;letter-spacing:2px;border-bottom:1px solid #3a3a5a;padding-bottom:8px;margin-bottom:8px;}
.shp-item{display:flex;align-items:center;justify-content:space-between;padding:6px 4px;border-bottom:1px solid #2a2a3a;font-size:11px;}
.shp-item:hover{background:rgba(201,162,39,0.1);}
.shp-item.nobuy{opacity:0.4;}
.shp-name{color:#e8e4d9;}
.shp-desc{color:#6a6a7a;font-size:10px;}
.shp-price{color:#c9a227;white-space:nowrap;}
.shp-buy{padding:3px 10px;background:#c9a227;color:#18182a;border:none;font-size:10px;cursor:pointer;}
.shp-buy:hover{background:#ffd700;}
.shp-buy:disabled{background:#4a4a5a;color:#6a6a7a;cursor:not-allowed;}
#shp-equip{flex:0.3;background:rgba(20,18,30,0.9);border:1px solid #3a3a5a;padding:12px;}
#shp-equip h3{color:#c9a227;font-size:12px;letter-spacing:2px;border-bottom:1px solid #3a3a5a;padding-bottom:8px;margin-bottom:8px;}
.eq-slot{display:flex;align-items:center;justify-content:space-between;padding:5px 4px;border-bottom:1px solid #2a2a3a;font-size:11px;}
.eq-name{color:#e8e4d9;}
.eq-empty{color:#4a4a5a;font-style:italic;}
#shp-close{position:absolute;top:12px;right:16px;color:#6a6a7a;font-size:20px;cursor:pointer;}
#shp-close:hover{color:#c9a227;}
</style>
</head>
<body>
<div id="wrap">
<canvas id="bgC" width="800" height="560"></canvas>
<canvas id="gC" width="800" height="560"></canvas>
<canvas id="pC" width="800" height="560"></canvas>

<div id="ui">
<div class="panel">
<div class="ptitle">冒险者</div>
<div class="s">等级 <span id="lv">1</span>　金币 <span id="gd">0</span></div>
<div class="s" style="margin-top:4px;">HP</div>
<div class="hp-bar"><div class="hp-f" id="hf" style="width:100%"></div></div>
<div class="s" style="margin-top:3px;">MP</div>
<div class="mp-bar"><div class="mp-f" id="mf" style="width:100%"></div></div>
<div class="s" style="margin-top:3px;">EXP</div>
<div class="xp-bar"><div class="xp-f" id="xf" style="width:0%"></div></div>
</div>
<div class="panel" style="text-align:right;">
<div class="ptitle">探索</div>
<div class="s">第 <span id="fl">1</span> 层</div>
<div class="s">步数 <span id="st">0</span></div>
</div>
</div>

<div id="info">WASD移动 · U打开商店 · 撞墙遇敌 · 寻找楼梯通往下一层</div>
<canvas id="mm" width="100" height="100"></canvas>

<div id="bo"><canvas id="bc" width="800" height="560"></canvas>
<div id="bui">
<div id="bt">— 战 斗 —</div>
<div id="blg"></div>
<div id="ba">
<button class="bbtn" id="b-atk">⚔ 攻击</button>
<button class="bbtn" id="b-def">🛡 防御</button>
<button class="bbtn" id="b-skl">✨ 技能</button>
<button class="bbtn" id="b-itm">💊 道具</button>
<button class="bbtn" id="b-fle">🏃 逃跑</button>
</div>
</div>
</div>

<div id="so">
<h1>八 方 旅 人</h1>
<h2>HD-2D 像素冒险</h2>
<p>WASD 移动角色<br>探索广袤的幻想世界<br>击败强敌，寻找命运的真谛</p>
<button class="sbtn" id="btn-go">开 始 旅 程</button>
</div>

<div id="shp">
<span id="shp-close">✕</span>
<h2>商 店</h2>
<div class="sub">金币: <span id="shp-gold">0</span></div>
<div id="shp-inner">
<div class="shp-col" id="shp-weapons">
<h3>⚔️ 武器</h3></div>
<div class="shp-col" id="shp-armors">
<h3>🛡️ 防具</h3></div>
<div class="shp-col" id="shp-potions">
<h3>💊 药水</h3></div>
<div id="shp-equip">
<h3>📦 装备</h3>
<div id="eq-weapon" class="eq-slot"><span class="eq-empty">无武器</span></div>
<div id="eq-armor" class="eq-slot"><span class="eq-empty">无护甲</span></div>
<div id="eq-accessory" class="eq-slot"><span class="eq-empty">无饰品</span></div>
<div style="margin-top:12px;border-top:1px solid #3a3a5a;padding-top:8px;">
<div class="sub" style="margin-bottom:4px;">背包:</div>
<div id="eq-inv" style="font-size:10px;color:#8a8078;"></div>
</div>
</div>
</div>
</div>
</div>

<script>
const bgC=document.getElementById('bgC'),bgX=bgC.getContext('2d');
const gC=document.getElementById('gC'),gX=gC.getContext('2d');
const pC=document.getElementById('pC'),pX=pC.getContext('2d');
const mmC=document.getElementById('mm'),mX=mmC.getContext('2d');
const bC=document.getElementById('bc'),bX=bC.getContext('2d');

const W=800,H=560,T=40,COLS=W/T,ROWS=H/T;

const P2={
  sky1:'#1a2840',sky2:'#3d5070',sky3:'#5a7a9a',
  sun:'#ffdd88',sunGlow:'rgba(255,220,140,0.4)',
  hill1:'#2a4a30',hill2:'#3a5a40',hill3:'#4a6a50',
  grass1:'#3a6028',grass2:'#4a7035',grass3:'#2a5020',grass4:'#5a8040',
  treeTrunk:'#5a4030',treeLeaves:'#2a6020',treeLeaves2:'#3a7030',treeDark:'#1a4015',
  flower1:'#ff6688',flower2:'#ffaa44',flower3:'#ffdd66',flower4:'#aa88ff',
  path:'#8a7050',pathDark:'#6a5030',pathLight:'#aa9070',
  water:'#3388aa',waterLight:'#55aacc',waterDark:'#226688',
  wall:'#4a4a5a',wallT:'#6a6a7a',
  cape:'#8b2942',armor:'#4a6a8a',skin:'#e8c8a0',hair:'#3a2a1a',
  slime:'#5aaa5a',skel:'#d8d8c0',demon:'#aa2244',dragon:'#661133',gold:'#c9a227'
};

let P={hp:120,maxHp:120,mp:30,maxMp:30,exp:0,level:1,atk:14,def:6,spd:5,luk:3,gold:0,inv:[{t:'potion',n:2}]};
let map=[],fog=[],pl={x:5,y:5},fl=1,steps=0,enemies=[],chests=[],stX=0,stY=0;
let inB=false,ce=null,bTurn='player',defending=false;
let parts=[];

const ET={slime:{n:'史莱姆',h:25,a:6,d:2,s:3,e:12,g:8,c:'#5aaa5a'},skeleton:{n:'骷髅战士',h:40,a:12,d:5,s:4,e:25,g:15,c:'#d8d8c0'},demon:{n:'深渊恶魔',h:80,a:22,d:8,s:5,e:60,g:45,c:'#aa2244'},dragon:{n:'远古巨龙',h:300,a:40,d:20,s:6,e:300,g:500,c:'#661133'}};

// Shop items
const SHOP={
  weapons:[
    {n:'短剑',d:'ATK+5',p:100,a:{atk:5},s:1},
    {n:'长剑',d:'ATK+12',p:300,a:{atk:12},s:2},
    {n:'焰光剑',d:'ATK+25',p:800,a:{atk:25},s:3},
    {n:'龙牙刃',d:'ATK+50',p:2000,a:{atk:50},s:4},
    {n:'神圣长剑',d:'ATK+100',p:5000,a:{atk:100},s:5}
  ],
  armors:[
    {n:'皮甲',d:'DEF+3 HP+20',p:80,a:{def:3,hp:20},s:1},
    {n:'锁甲',d:'DEF+8 HP+50',p:250,a:{def:8,hp:50},s:2},
    {n:'银铠甲',d:'DEF+18 HP+100',p:600,a:{def:18,hp:100},s:3},
    {n:'龙鳞甲',d:'DEF+35 HP+200',p:1500,a:{def:35,hp:200},s:4},
    {n:'神圣铠甲',d:'DEF+70 HP+400',p:4000,a:{def:70,hp:400},s:5}
  ],
  accessories:[
    {n:'幸运符',d:'SPD+1 LUK+1',p:60,a:{spd:1,luk:1},s:1},
    {n:'敏捷戒指',d:'SPD+2 LUK+2',p:200,a:{spd:2,luk:2},s:2},
    {n:'疾风吊坠',d:'SPD+4 LUK+4',p:400,a:{spd:4,luk:4},s:3},
    {n:'龙之爪',d:'SPD+8 LUK+8',p:1000,a:{spd:8,luk:8},s:4},
    {n:'凤凰之羽',d:'SPD+15 LUK+15',p:3000,a:{spd:15,luk:15},s:5}
  ],
  potions:[
    {n:'小血药',d:'恢复30% HP',p:20,a:{type:'potion',hp:0.3},s:0},
    {n:'大血药',d:'恢复80% HP',p:80,a:{type:'potion',hp:0.8},s:0},
    {n:'小蓝药',d:'恢复30% MP',p:30,a:{type:'mpotion',mp:0.3},s:0},
    {n:'大蓝药',d:'恢复80% MP',p:100,a:{type:'mpotion',mp:0.8},s:0}
  ]
};

let shopOpen=false;

// Initialize player with equipment slots
P.weapon=null;P.armor=null;P.accessory=null;

function calcBonus(){return{atk:P.weapon?P.weapon.a.atk:0,def:P.armor?P.armor.a.def:0,spd:P.accessory?P.accessory.a.spd:0,luk:P.accessory?P.accessory.a.luk:0};}

function openShop(){
  if(inB)return;
  shopOpen=true;
  document.getElementById('shp').classList.add('on');
  renderShop();
}
function closeShop(){
  shopOpen=false;
  document.getElementById('shp').classList.remove('on');
}
function renderShop(){
  document.getElementById('shp-gold').textContent=P.gold;
  renderShopCol('weapons','shp-weapons');
  renderShopCol('armors','shp-armors');
  renderShopCol('potions','shp-potions');
  // Equipment slots
  document.getElementById('eq-weapon').innerHTML=P.weapon?`<span class="eq-name">⚔️ ${P.weapon.n}</span><span style="color:#6a6a7a">${P.weapon.d}</span>`:'<span class="eq-empty">无武器</span>';
  document.getElementById('eq-armor').innerHTML=P.armor?`<span class="eq-name">🛡️ ${P.armor.n}</span><span style="color:#6a6a7a">${P.armor.d}</span>`:'<span class="eq-empty">无护甲</span>';
  document.getElementById('eq-accessory').innerHTML=P.accessory?`<span class="eq-name">💍 ${P.accessory.n}</span><span style="color:#6a6a7a">${P.accessory.d}</span>`:'<span class="eq-empty">无饰品</span>';
  // Inventory
  const invDiv=document.getElementById('eq-inv');
  if(P.inv.length===0){invDiv.innerHTML='<span style="color:#4a4a5a">空空如也</span>';}
  else{invDiv.innerHTML=P.inv.map(i=>`${i.t==='potion'?'💊':'💧'}${i.t==='potion'?'血药':'蓝药'} x${i.n}`).join('<br>');}
}
function renderShopCol(type,divId){
  const col=document.getElementById(divId);
  const stars='★'.repeat(Math.min(fl,5));
  col.innerHTML=`<h3>${type==='weapons'?'⚔️ 武器':type==='armors'?'🛡️ 防具':'💊 药水'} (层数:${fl})</h3>`;
  SHOP[type].forEach((item,idx)=>{
    const canBuy=P.gold>=item.p&&item.s<=fl;
    const locked=item.s>fl;
    const div=document.createElement('div');
    div.className='shp-item'+(locked||!canBuy?' nobuy':'');
    div.innerHTML=`
      <div><div class="shp-name">${item.n}</div><div class="shp-desc">${item.d}${locked?' [需第'+item.s+'层]':''}</div></div>
      <div style="text-align:right;">
        <div class="shp-price">💰${item.p}</div>
        <button class="shp-buy" ${!canBuy?'disabled':''} onclick="buyItem('${type}',${idx})">购买</button>
      </div>`;
    col.appendChild(div);
  });
}
function buyItem(type,idx){
  const item=SHOP[type][idx];
  if(P.gold<item.p||item.s>fl)return;
  P.gold-=item.p;
  if(item.a.type==='potion'||item.a.type==='mpotion'){
    const t=item.a.type==='potion'?'potion':'mpotion';
    const exist=P.inv.find(i=>i.t===t);
    if(exist){exist.n++;}
    else{P.inv.push({t:t,n:1});}
    bl(`💊 购买 ${item.n}！`);
  } else {
    // Equipment - auto equip if better
    if(type==='weapons'){
      if(!P.weapon||P.weapon.s<item.s){P.weapon=item;bl(`⚔️ 装备 ${item.n}！ATK+${item.a.atk}`);}
      else{P.gold+=Math.floor(item.p*0.7);bl(`⚔️ 已拥有更好的武器，退款${Math.floor(item.p*0.7)}`);}
    } else if(type==='armors'){
      if(!P.armor||P.armor.s<item.s){P.armor=item;P.maxHp+=item.a.hp;P.hp=Math.min(P.hp+item.a.hp,P.maxHp);bl(`🛡️ 装备 ${item.n}！DEF+${item.a.def} HP+${item.a.hp}`);}
      else{P.gold+=Math.floor(item.p*0.7);bl(`🛡️ 已拥有更好的护甲，退款${Math.floor(item.p*0.7)}`);}
    } else if(type==='accessories'){
      if(!P.accessory||P.accessory.s<item.s){P.accessory=item;bl(`💍 装备 ${item.n}！SPD+${item.a.spd} LUK+${item.a.luk}`);}
      else{P.gold+=Math.floor(item.p*0.7);bl(`💍 已拥有更好的饰品，退款${Math.floor(item.p*0.7)}`);}
    }
    saveD();
  }
  renderShop();
  updUI();
}

function xpN(lv){return Math.floor(Math.pow(lv,1.5)*60);}
function gHP(){const b=calcBonus();return P.maxHp+(P.armor?P.armor.a.hp:0);}
function gMP(){return P.maxMp;}
function gATK(){ return P.atk+(P.weapon?P.weapon.a.atk:0);}
function gDEF(){return P.def+(P.armor?P.armor.a.def:0);}
function gSPD(){return P.spd+(P.accessory?P.accessory.a.spd:0);}
function gLUK(){return P.luk+(P.accessory?P.accessory.a.luk:0);}

function lvlUp(){while(P.exp>=xpN(P.level)){P.exp-=xpN(P.level);P.level++;P.maxHp+=12;P.maxMp+=4;P.hp=gHP();P.mp=gMP();P.atk+=2;P.def+=1;P.spd+=1;P.luk+=1;bl(`<span class="bv">🎉 Lv.${P.level}！能力提升！</span>`);}}

function updUI(){
  document.getElementById('lv').textContent=P.level;
  document.getElementById('gd').textContent=P.gold;
  document.getElementById('fl').textContent=fl;
  document.getElementById('st').textContent=steps;
  document.getElementById('hf').style.width=(P.hp/gHP()*100)+'%';
  document.getElementById('mf').style.width=(P.mp/gMP()*100)+'%';
  document.getElementById('xf').style.width=(P.exp/xpN(P.level)*100)+'%';
}

function initParts(){parts=[];for(let i=0;i<35;i++)parts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.4,vy:-0.3-Math.random()*0.4,sz:1+Math.random()*2,al:0.3+Math.random()*0.5,co:Math.random()>0.5?'#ffeeaa':'#aaffaa'});}
function updParts(){pX.clearRect(0,0,W,H);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.y<0){p.y=H;p.x=Math.random()*W;}pX.fillStyle=p.co;pX.globalAlpha=p.al;pX.fillRect(p.x,p.y,p.sz,p.sz);});pX.globalAlpha=1;}

function drawBG(){
  const ctx=bgX,w=W,h=H;
  
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,h*0.65);
  sky.addColorStop(0,P2.sky1);sky.addColorStop(0.5,P2.sky2);sky.addColorStop(1,P2.sky3);
  ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);
  
  // Sun with glow
  const sx=w*0.72,sy=h*0.15;
  const gl=ctx.createRadialGradient(sx,sy,0,sx,sy,150);gl.addColorStop(0,P2.sunGlow);gl.addColorStop(0.5,'rgba(255,200,100,0.15)');gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.fillRect(sx-180,sy-180,360,360);
  ctx.fillStyle=P2.sun;ctx.beginPath();ctx.arc(sx,sy,32,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,200,0.6)';ctx.beginPath();ctx.arc(sx,sy,20,0,Math.PI*2);ctx.fill();
  
  // Clouds (more variety)
  function cloud(cx,cy,s,op=0.6){ctx.fillStyle=`rgba(230,220,240,${op})`;ctx.beginPath();ctx.arc(cx,cy,18*s,0,Math.PI*2);ctx.arc(cx+24*s,cy-6*s,22*s,0,Math.PI*2);ctx.arc(cx+50*s,cy,20*s,0,Math.PI*2);ctx.arc(cx+30*s,cy+8*s,15*s,0,Math.PI*2);ctx.fill();}
  cloud(w*0.15,h*0.12,1.2,0.7);cloud(w*0.45,h*0.08,0.9,0.5);cloud(w*0.7,h*0.18,1.0,0.6);cloud(w*0.9,h*0.1,0.7,0.4);
  
  // Distant mountains
  ctx.fillStyle='#1a2a35';
  ctx.beginPath();ctx.moveTo(0,h*0.5);
  for(let x=0;x<=w;x+=40)ctx.lineTo(x,h*0.42+Math.sin(x*0.008)*25+Math.sin(x*0.02)*18);
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  
  // Far hills (dark green forest)
  ctx.fillStyle=P2.hill1;
  ctx.beginPath();ctx.moveTo(0,h*0.52);
  for(let x=0;x<=w;x+=25)ctx.lineTo(x,h*0.48+Math.sin(x*0.01+2)*20+Math.sin(x*0.025)*15);
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  
  // Mid hills with trees
  ctx.fillStyle=P2.hill2;
  ctx.beginPath();ctx.moveTo(0,h*0.58);
  for(let x=0;x<=w;x+=20)ctx.lineTo(x,h*0.54+Math.sin(x*0.012+1)*18+Math.sin(x*0.028)*12);
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  
  // Draw trees on mid hills
  for(let x=20;x<w;x+=60){
    const ty=h*0.52+Math.sin(x*0.012+1)*18+Math.sin(x*0.028)*12-20;
    drawTree(ctx,x,ty,0.8,'pine');
  }
  
  // Near hills
  ctx.fillStyle=P2.hill3;
  ctx.beginPath();ctx.moveTo(0,h*0.62);
  for(let x=0;x<=w;x+=18)ctx.lineTo(x,h*0.58+Math.sin(x*0.015)*15+Math.sin(x*0.03+2)*10);
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  
  // Draw more trees on near hills
  for(let x=30;x<w;x+=80){
    const ty=h*0.55+Math.sin(x*0.015)*15+Math.sin(x*0.03+2)*10-25;
    drawTree(ctx,x,ty,1.0,'oak');
  }
  
  // Ground - rich grassland
  const gr=ctx.createLinearGradient(0,h*0.6,0,h);gr.addColorStop(0,P2.grass4);gr.addColorStop(0.3,P2.grass2);gr.addColorStop(1,P2.grass1);
  ctx.fillStyle=gr;ctx.fillRect(0,h*0.6,w,h*0.4);
  
  // Ground texture - grass patches
  ctx.fillStyle=P2.grass3;
  for(let i=0;i<100;i++){
    const gx=Math.random()*w,gy=h*0.6+Math.random()*h*0.38;
    ctx.fillRect(gx,gy,3+Math.random()*4,2);
  }
  
  // Winding path through meadow
  ctx.strokeStyle=P2.path;ctx.lineWidth=50;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(-20,h*0.75);
  ctx.bezierCurveTo(w*0.2,h*0.7,w*0.3,h*0.85,w*0.5,h*0.78);
  ctx.bezierCurveTo(w*0.7,h*0.7,w*0.8,h*0.88,w*0.85,h*0.82);
  ctx.bezierCurveTo(w*0.9,h*0.76,w*0.95,h*0.92,w*w+20,h*0.88);
  ctx.stroke();
  
  // Path detail
  ctx.strokeStyle=P2.pathLight;ctx.lineWidth=35;
  ctx.beginPath();
  ctx.moveTo(-20,h*0.75);
  ctx.bezierCurveTo(w*0.2,h*0.7,w*0.3,h*0.85,w*0.5,h*0.78);
  ctx.bezierCurveTo(w*0.7,h*0.7,w*0.8,h*0.88,w*0.85,h*0.82);
  ctx.bezierCurveTo(w*0.9,h*0.76,w*0.95,h*0.92,w*w+20,h*0.88);
  ctx.stroke();
  
  // Path edge detail
  ctx.strokeStyle=P2.pathDark;ctx.lineWidth=2;
  for(let i=0;i<w;i+=15){
    const py=h*0.75+Math.sin(i*0.02)*0.05*h;
    ctx.fillStyle=P2.grass2;
    ctx.fillRect(i-2,py-8,4,6);
  }
  
  // Scatter trees in foreground
  const treePositions=[50,150,280,400,550,680,750];
  treePositions.forEach(tx=>{
    drawTree(ctx,tx,h*0.65+Math.random()*h*0.2,1.2,Math.random()>0.5?'pine':'oak');
  });
  
  // Bushes
  const bushPositions=[100,220,350,480,600,720];
  bushPositions.forEach((bx,i)=>{
    drawBush(ctx,bx,h*0.68+(i%2)*25+Math.random()*20,0.6+Math.random()*0.4);
  });
  
  // Flowers
  drawFlowers(ctx,0,h*0.65,w,h*0.35);
  
  // Pond/water feature
  drawPond(ctx,w*0.15,h*0.78,60,35);
  
  // Birds (simple)
  for(let i=0;i<5;i++){
    const bx=(w*0.3+i*80)%w;
    const by=h*0.2+Math.random()*h*0.15;
    drawBird(ctx,bx,by);
  }
}

function drawTree(ctx,x,y,scale,type){
  // Trunk
  ctx.fillStyle=P2.treeTrunk;
  ctx.fillRect(x-4*scale,y,8*scale,25*scale);
  ctx.fillRect(x-3*scale,y+5*scale,6*scale,20*scale);
  
  if(type==='pine'){
    // Pine tree - triangular
    ctx.fillStyle=P2.treeDark;
    ctx.beginPath();ctx.moveTo(x,y-30*scale);ctx.lineTo(x-25*scale,y+5*scale);ctx.lineTo(x+25*scale,y+5*scale);ctx.fill();
    ctx.fillStyle=P2.treeLeaves;
    ctx.beginPath();ctx.moveTo(x,y-45*scale);ctx.lineTo(x-20*scale,y-10*scale);ctx.lineTo(x+20*scale,y-10*scale);ctx.fill();
    ctx.fillStyle=P2.treeLeaves2;
    ctx.beginPath();ctx.moveTo(x,y-55*scale);ctx.lineTo(x-12*scale,y-25*scale);ctx.lineTo(x+12*scale,y-25*scale);ctx.fill();
  } else {
    // Oak - round crown
    ctx.fillStyle=P2.treeDark;
    ctx.beginPath();ctx.arc(x,y-15*scale,22*scale,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=P2.treeLeaves;
    ctx.beginPath();ctx.arc(x-8*scale,y-20*scale,16*scale,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+10*scale,y-18*scale,14*scale,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x,y-30*scale,12*scale,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4a8030';
    ctx.beginPath();ctx.arc(x-5*scale,y-25*scale,8*scale,0,Math.PI*2);ctx.fill();
  }
}

function drawBush(ctx,x,y,scale){
  ctx.fillStyle='#2a5020';
  ctx.beginPath();ctx.arc(x,y,12*scale,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-10*scale,y+3*scale,10*scale,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+10*scale,y+2*scale,9*scale,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a6030';
  ctx.beginPath();ctx.arc(x-5*scale,y-3*scale,8*scale,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+6*scale,y-2*scale,7*scale,0,Math.PI*2);ctx.fill();
}

function drawFlowers(ctx,x,y,w,h){
  const colors=[P2.flower1,P2.flower2,P2.flower3,P2.flower4,'#ffffff','#ff9966'];
  for(let i=0;i<80;i++){
    const fx=x+Math.random()*w;
    const fy=y+Math.random()*h;
    ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];
    ctx.beginPath();ctx.arc(fx,fy,2+Math.random()*3,0,Math.PI*2);ctx.fill();
    // Stem
    ctx.strokeStyle='#3a6020';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx,fy+8+Math.random()*8);ctx.stroke();
  }
}

function drawPond(ctx,x,y,r1,r2){
  // Water
  const water=ctx.createRadialGradient(x,y,0,x,y,r1);
  water.addColorStop(0,P2.waterLight);water.addColorStop(0.7,P2.water);water.addColorStop(1,P2.waterDark);
  ctx.fillStyle=water;
  ctx.beginPath();ctx.ellipse(x,y,r1,r2,0,0,Math.PI*2);ctx.fill();
  
  // Ripples
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(x,y,r1*0.6,r2*0.6,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(x,y,r1*0.3,r2*0.3,0,0,Math.PI*2);ctx.stroke();
  
  // Reeds on edge
  for(let i=0;i<5;i++){
    const rx=x+r1*0.8+Math.random()*20;
    const ry=y-Math.random()*10;
    ctx.strokeStyle='#4a6030';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(rx,ry+10);ctx.lineTo(rx+3,ry-15-Math.random()*10);ctx.stroke();
    ctx.fillStyle='#5a7040';
    ctx.beginPath();ctx.ellipse(rx+3,ry-18-Math.random()*10,3,6,0,0,Math.PI*2);ctx.fill();
  }
}

function drawBird(ctx,x,y){
  ctx.strokeStyle='#333';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-5,y);ctx.lineTo(x,y-3);ctx.lineTo(x+5,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-3);ctx.lineTo(x,y+2);ctx.stroke();
}

function genMap(f){
  map=[];fog=[];enemies=[];chests=[];
  for(let y=0;y<ROWS;y++){map[y]=[];fog[y]=[];for(let x=0;x<COLS;x++){map[y][x]=(x===0||y===0||x===COLS-1||y===ROWS-1)?1:0;fog[y][x]=1;}}
  for(let i=0;i<8+f*3;i++){const wx=2+Math.floor(Math.random()*(COLS-4)),wy=2+Math.floor(Math.random()*(ROWS-4));if(wx!==pl.x||wy!==pl.y)map[wy][wx]=1;}
  pl.x=1+Math.floor(Math.random()*3);pl.y=1+Math.floor(Math.random()*3);
  stX=COLS-2-Math.floor(Math.random()*3);stY=ROWS-2-Math.floor(Math.random()*3);map[stY][stX]=2;
  for(let i=0;i<2+f;i++){let cx,cy,t=0;do{cx=2+Math.floor(Math.random()*(COLS-4));cy=2+Math.floor(Math.random()*(ROWS-4));t++;}while(map[cy][cx]!==0&&t<30);if(t<30)chests.push({x:cx,y:cy,op:false});}
  const types=f<3?['slime']:f<5?['slime','skeleton']:f<8?['skeleton','demon']:['skeleton','demon','dragon'];
  for(let i=0;i<4+f*2;i++){let ex,ey,t=0;do{ex=2+Math.floor(Math.random()*(COLS-4));ey=2+Math.floor(Math.random()*(ROWS-4));t++;}while((map[ey][ex]!==0||(ex===pl.x&&ey===pl.y))&&t<50);if(t<50)enemies.push({x:ex,y:ey,t:types[Math.floor(Math.random()*types.length)],al:true});}
  rev(pl.x,pl.y);
}
function rev(px,py){for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){const nx=px+dx,ny=py+dy;if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&Math.abs(dx)+Math.abs(dy)<=4)fog[ny][nx]=0;}}

function render(){
  gX.clearRect(0,0,W,H);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(fog[y][x]===1){gX.fillStyle='#050508';gX.fillRect(x*T,y*T,T,T);continue;}
    const t=map[y][x];
    if(t===1){gX.fillStyle=P2.wall;gX.fillRect(x*T,y*T,T,T);gX.fillStyle=P2.wallT;gX.fillRect(x*T+2,y*T+2,T-4,6);}
    else if(t===2){gX.fillStyle=P2.grass2;gX.fillRect(x*T,y*T,T,T);gX.fillStyle=P2.gold;gX.fillRect(x*T+10,y*T+6,20,28);gX.fillStyle='#aa8800';for(let i=0;i<3;i++)gX.fillRect(x*T+12,y*T+10+i*9,16,4);}
    else{gX.fillStyle=P2.grass1;gX.fillRect(x*T,y*T,T,T);gX.fillStyle=P2.grass2;gX.fillRect(x*T+2,y*T+2,T-4,T-4);
      if((x+y)%3===0){gX.fillStyle=P2.grass3;gX.fillRect(x*T+8,y*T+12,2,6);gX.fillRect(x*T+24,y*T+28,2,4);}
      if((x*y)%7===0){gX.fillStyle=P2.grass4;gX.fillRect(x*T+4,y*T+20,3,2);}
      // Random flowers
      if((x*7+y*13)%23===0){gX.fillStyle='#ff6688';gX.fillRect(x*T+14,y*T+8,3,3);}
      if((x*11+y*17)%29===0){gX.fillStyle='#ffaa44';gX.fillRect(x*T+26,y*T+16,3,3);}
      // Grass tufts
      if((x+y)%5===0){gX.fillStyle=P2.grass3;gX.fillRect(x*T+16,y*T+26,2,8);gX.fillRect(x*T+20,y*T+24,2,6);}
    }
  }
  chests.forEach(c=>{if(c.op||fog[c.y][c.x]===1)return;gX.fillStyle='#6a5a3a';gX.fillRect(c.x*T+10,c.y*T+18,20,12);gX.fillStyle='#cc9933';gX.fillRect(c.x*T+10,c.y*T+14,20,12);gX.fillStyle='#ffcc66';gX.fillRect(c.x*T+17,c.y*T+17,5,5);});
  enemies.forEach(e=>{if(!e.al||fog[e.y][e.x]===1)return;const b=ET[e.t];const ex=e.x*T+(T-32)/2,ey=e.y*T+(T-28)/2;gX.fillStyle=b.c;
    if(e.t==='slime'){gX.fillRect(ex+4,ey+14,24,14);gX.fillRect(ex+6,ey+8,20,8);}
    else if(e.t==='skeleton'){gX.fillRect(ex+10,ey,12,12);gX.fillRect(ex+8,ey+12,16,16);}
    else if(e.t==='demon'){gX.fillRect(ex+4,ey+6,24,22);gX.fillRect(ex-2,ey+2,10,12);gX.fillRect(ex+24,ey+2,10,12);}
    else if(e.t==='dragon'){gX.fillRect(ex,ey+8,40,28);gX.fillRect(ex-6,ey,14,14);gX.fillRect(ex+32,ey,14,14);gX.fillStyle='#ff4444';gX.fillRect(ex+8,ey+16,8,8);gX.fillRect(ex+24,ey+16,8,8);}
  });
  const px=pl.x*T,py=pl.y*T;
  gX.fillStyle=P2.cape;gX.fillRect(px+12,py+22,10,16);gX.fillRect(px+8,py+28,6,10);
  gX.fillStyle=P2.armor;gX.fillRect(px+14,py+18,12,14);
  gX.fillStyle=P2.skin;gX.fillRect(px+16,py+4,8,14);
  gX.fillStyle=P2.hair;gX.fillRect(px+16,py+2,8,7);
  gX.fillStyle='#222';gX.fillRect(px+18,py+10,2,2);gX.fillRect(px+22,py+10,2,2);
  gX.fillStyle='#c0c0c0';gX.fillRect(px+28,py+8,3,20);
  gX.fillStyle=P2.gold;gX.fillRect(px+26,py+10,7,3);
  gX.fillStyle='rgba(255,255,255,0.12)';gX.beginPath();gX.moveTo(px+T/2,py);gX.lineTo(px+T/2-5,py+7);gX.lineTo(px+T/2+5,py+7);gX.fill();
  drawMM();updUI();
}

function drawMM(){
  mX.fillStyle='#08080c';mX.fillRect(0,0,100,100);
  const ts=100/COLS;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(fog[y][x]===1)continue;
    if(map[y][x]===1)mX.fillStyle='#4a4a5a';
    else if(map[y][x]===2)mX.fillStyle=P2.gold;
    else mX.fillStyle='#3a5a3a';
    mX.fillRect(x*ts,y*ts,ts,ts);
  }
  enemies.forEach(e=>{if(e.al&&fog[e.y][e.x]===0){mX.fillStyle='#ff4444';mX.fillRect(e.x*ts,e.y*ts,ts,ts);}});
  mX.fillStyle='#00aaff';mX.fillRect(pl.x*ts,pl.y*ts,ts,ts);
}

function move(dx,dy){
  if(inB)return;
  const nx=pl.x+dx,ny=pl.y+dy;
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS)return;
  if(map[ny][nx]===1){
    const e=enemies.find(e=>e.x===nx&&e.y===ny&&e.al);
    if(e){e.al=false;startBattle(e.t);return;}
    return;
  }
  pl.x=nx;pl.y=ny;steps++;rev(nx,ny);
  if(map[ny][nx]===2){fl++;genMap(fl);bl(`🗼 进入第${fl}层！`);saveD();}
  const ci=chests.findIndex(c=>c.x===nx&&c.y===ny&&!c.op);
  if(ci!==-1){chests[ci].op=true;const gb=10+fl*8+Math.floor(Math.random()*25);P.gold+=gb;bl(`💰 宝箱！+${gb}金币`);saveD();}
  render();
}

function bl(msg){const l=document.getElementById('blg');const p=document.createElement('p');p.innerHTML=msg;l.appendChild(p);l.scrollTop=l.scrollHeight;}
function clearL(){document.getElementById('blg').innerHTML='';}
function sBtns(en){['atk','def','skl','itm','fle'].forEach(id=>document.getElementById('b-'+id).disabled=!en);}

function startBattle(t){
  inB=true;const b=ET[t],fb=1+fl*0.12;
  ce={t,h:Math.floor(b.h*fb),mH:Math.floor(b.h*fb),a:Math.floor(b.a*fb),d:Math.floor(b.d*fb),s:b.s,e:Math.floor(b.e*fb),g:Math.floor(b.g*fb)};
  bTurn=gSPD()>=ce.s?'player':'enemy';defending=false;
  clearL();bl(`⚔️ 遭遇 ${b.n}！`);
  document.getElementById('bo').classList.add('on');sBtns(true);renderB();
}

function patt(){
  if(!inB||bTurn!=='player')return;
  let dmg=gATK()-ce.d+Math.floor(Math.random()*7)-3;
  const crit=Math.random()*100<gLUK()*2;
  if(crit)dmg*=2;
  dmg=Math.max(1,dmg);ce.h=Math.max(0,ce.h-dmg);
  bl(`⚔️ 攻击！<span class="bd">${dmg}</span>伤害${crit?'(暴击!)':''}`);
  ce.h<=0?victory():eTurn();
}
function def(){
  if(!inB||bTurn!=='player')return;
  defending=true;P.mp=Math.min(gMP(),P.mp+5);
  bl('🛡️ 防御！MP+5');eTurn();
}
function skl(){
  if(!inB||bTurn!=='player')return;
  if(P.mp<10){bl('❌ MP不足！');return;}
  P.mp-=10;let dmg=Math.floor(gATK()*1.8)-ce.d+Math.floor(Math.random()*10);dmg=Math.max(1,dmg);ce.h=Math.max(0,ce.h-dmg);
  bl(`✨ 强力一击！<span class="bd">${dmg}</span>伤害！`);ce.h<=0?victory():eTurn();
}
function itm(){
  if(!inB||bTurn!=='player')return;
  const idx=P.inv.findIndex(i=>i.t==='potion'&&i.n>0);
  if(idx===-1){bl('❌ 没有药水！');return;}
  P.inv[idx].n--;if(P.inv[idx].n<=0)P.inv.splice(idx,1);
  const hl=Math.floor(gHP()*0.35);P.hp=Math.min(gHP(),P.hp+hl);
  bl(`💊 药水！HP<span class="bh">+${hl}</span>`);eTurn();
}
function fle(){
  if(!inB||bTurn!=='player')return;
  if(Math.random()<0.6){inB=false;document.getElementById('bo').classList.remove('on');bl('🏃 逃跑成功！');setTimeout(()=>clearL(),800);}
  else{bl('❌ 逃跑失败！');eTurn();}
}
function eTurn(){
  bTurn='enemy';sBtns(false);
  setTimeout(()=>{
    let dmg=ce.a-gDEF()+Math.floor(Math.random()*5)-2;
    if(defending)dmg=Math.floor(dmg*0.5);
    dmg=Math.max(1,dmg);P.hp=Math.max(0,P.hp-dmg);defending=false;
    bl(`敌人攻击！<span class="bd">${dmg}</span>伤害！`);
    if(P.hp<=0){P.hp=Math.floor(gHP()*0.5);P.gold=Math.max(0,P.gold-Math.floor(P.gold*0.1));inB=false;document.getElementById('bo').classList.remove('on');bl('<span class="bd">💀 你倒下了...</span>恢复中...');}
    else{bTurn='player';sBtns(true);}
    render();
  },700);
}
function victory(){
  inB=false;P.exp+=ce.e;P.gold+=ce.g;
  document.getElementById('bo').classList.remove('on');
  bl(`<span class="bv">🎉 胜利！</span>获得${ce.e}EXP，${ce.g}金币`);
  lvlUp();saveD();render();
}

function renderB(){
  bX.clearRect(0,0,W,H);
  if(!ce)return;
  const b=ET[ce.t],cx=W*0.62,cy=H*0.35;
  const bg=bX.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.6);
  bg.addColorStop(0,'#1a0a20');bg.addColorStop(1,'#04040a');
  bX.fillStyle=bg;bX.fillRect(0,0,W,H);
  bX.fillStyle='#12121a';bX.fillRect(0,H*0.55,W,H*0.45);
  bX.fillStyle=b.c;
  if(ce.t==='dragon'){bX.fillRect(cx-50,cy-25,100,65);bX.fillRect(cx-70,cy-45,35,35);bX.fillRect(cx+35,cy-45,35,35);bX.fillStyle='#ff4444';bX.fillRect(cx-35,cy-5,18,18);bX.fillRect(cx+17,cy-5,18,18);}
  else if(ce.t==='demon'){bX.fillRect(cx-30,cy-15,60,50);bX.fillRect(cx-45,cy-35,20,25);bX.fillRect(cx+25,cy-35,20,25);bX.fillStyle='#ff6666';bX.fillRect(cx-20,cy,14,14);bX.fillRect(cx+6,cy,14,14);}
  else if(ce.t==='skeleton'){bX.fillRect(cx-15,cy-25,30,30);bX.fillRect(cx-20,cy+5,40,40);bX.fillRect(cx-30,cy+5,14,8);bX.fillRect(cx+16,cy+5,14,8);}
  else{bX.fillRect(cx-20,cy,40,30);bX.fillRect(cx-16,cy-12,32,16);}
  bX.fillStyle='#c9a227';bX.font='14px serif';bX.fillText(b.n,cx-20,cy-35);
  bX.fillStyle='#2a1515';bX.fillRect(cx-50,cy+45,100,12);
  bX.fillStyle='#c94444';bX.fillRect(cx-50,cy+45,100*(ce.h/ce.mH),12);
  bX.fillStyle='#fff';bX.font='9px serif';bX.fillText(`${ce.h}/${ce.mH}`,cx-20,cy+54);
}

function saveD(){localStorage.setItem('octopath',JSON.stringify({P,fl,steps}));}
function loadD(){const d=localStorage.getItem('octopath');if(d){const da=JSON.parse(d);P={...P,...da.P,weapon:P.weapon||da.P.weapon,armor:P.armor||da.P.armor,accessory:P.accessory||da.P.accessory};fl=da.fl;steps=da.steps||0;if(P.armor)P.maxHp+=P.armor.a.hp;}}

function startG(){
  document.getElementById('so').style.display='none';
  genMap(fl);initParts();drawBG();render();
}

document.getElementById('btn-go').onclick=startG;
document.getElementById('b-atk').onclick=patt;
document.getElementById('b-def').onclick=def;
document.getElementById('b-skl').onclick=skl;
document.getElementById('b-itm').onclick=itm;
document.getElementById('b-fle').onclick=fle;

document.addEventListener('keydown',e=>{
  if(e.key==='w'||e.key==='W'||e.key==='ArrowUp')move(0,-1);
  if(e.key==='s'||e.key==='S'||e.key==='ArrowDown')move(0,1);
  if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft')move(-1,0);
  if(e.key==='d'||e.key==='D'||e.key==='ArrowRight')move(1,0);
  if(e.key==='u'||e.key==='U'){if(shopOpen)closeShop();else openShop();}
  if(e.key==='Escape'&&shopOpen)closeShop();
});

document.getElementById('shp-close').onclick=closeShop;

function loop(){updParts();requestAnimationFrame(loop);}
loop();
</script>
